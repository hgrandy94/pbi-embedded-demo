{% extends "base.html" %}
{% block title %}Login – Power BI Embedded Demo{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-bar-chart-fill text-primary" style="font-size: 2.5rem;"></i>
          <h3 class="mt-2">Power BI Embedded</h3>
          <p class="text-muted">Sign in to continue</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input
                type="text"
                class="form-control"
                id="username"
                name="username"
                placeholder="Enter username"
                required
                autofocus
              >
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                placeholder="Enter password"
                required
              >
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-muted mt-3">
      <small>Default credentials: <code>admin</code> / <code>admin</code></small>
    </p>
  </div>
</div>
{% endblock %}
